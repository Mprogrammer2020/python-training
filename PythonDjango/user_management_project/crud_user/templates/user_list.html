{% block content %}
    <h2>User List</h2>
    <form method="get">
        <input type="text" name="q" placeholder="Search by name or email" value="{{ request.GET.q }}">
        <button type="submit">Search</button>
    </form>
    <ul>
        {% for user in users %}
            <li>{{ user.username }} - {{ user.email }}</li>
        {% endfor %}
    </ul>
{% endblock %}
