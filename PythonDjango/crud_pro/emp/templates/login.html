{% extends 'base_generic.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
    <h2>Login</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>

    {% if error %}
        <p class="text-danger">{{ error }}</p>
    {% endif %}

    <p>Don't have an account? <a href="{% url 'signup' %}" class="btn btn-link">Sign up here</a>.</p>
</div>
{% endblock %}
