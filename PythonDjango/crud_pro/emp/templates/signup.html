{% extends 'base_generic.html' %}

{% block title %}Signup{% endblock %}

{% block content %}
<div class="container">
    <h2>Signup</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Signup</button>
        <p>Already have an account? <a href="{% url 'login' %}" class="btn btn-link">Login here</a>.</p>
    </form>
</div>
{% endblock %}
